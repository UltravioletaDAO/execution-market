# =============================================================================
# Execution Market - Simplified Dev Stack
# =============================================================================
# Stack simplificado para desarrollo rápido sin complejidad de Supabase.
# Usa Supabase Cloud para la base de datos (más confiable y rápido).
#
# Servicios incluidos:
#   - mcp-server (FastAPI backend)
#   - dashboard (React frontend)
#   - redis (cache)
#   - anvil (blockchain local)
#
# Usa Supabase Cloud para base de datos:
#   - Configurar SUPABASE_URL y keys en .env
#   - O usar Supabase local con: supabase start
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
# =============================================================================

version: "3.8"

services:
  # ===================
  # MCP Server (Python + FastAPI)
  # ===================
  mcp-server:
    container_name: em-mcp-server
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      # Supabase (Cloud)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Blockchain
      - X402_PRIVATE_KEY=${X402_PRIVATE_KEY}
      - X402_RPC_URL=http://anvil:8545
      - X402_FACILITATOR_URL=https://facilitator.ultravioletadao.xyz
      - CHAIN_ID=31337
      - X402_NETWORK=base
      # AI
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Storage
      - PINATA_JWT=${PINATA_JWT}
      # Redis
      - REDIS_URL=redis://redis:6379/0
      # Feature Flags
      - ENABLE_AI_VERIFICATION=true
      - ENABLE_ERC8004_INTEGRATION=true
      - EM_ENABLED_NETWORKS=base,base-sepolia
      - EM_PLATFORM_FEE=0.08
      # ERC-8004
      - ERC8004_NETWORK=base
      - EM_AGENT_ID=2106
    volumes:
      - ./mcp_server:/app:cached
    depends_on:
      - redis
      - anvil
    networks:
      - em-network
    restart: unless-stopped

  # ===================
  # Dashboard (React + Vite)
  # ===================
  dashboard:
    container_name: em-dashboard
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_URL=http://localhost:8000
      - VITE_DYNAMIC_ENVIRONMENT_ID=${VITE_DYNAMIC_ENVIRONMENT_ID}
      - VITE_WALLET_CONNECT_PROJECT_ID=${VITE_WALLET_CONNECT_PROJECT_ID}
      - VITE_CHAIN_ID=31337
      - VITE_REQUIRE_AGENT_API_KEY=false
      - VITE_ALLOW_DIRECT_SUPABASE_MUTATIONS=true
    volumes:
      - ./dashboard:/app:cached
      - dashboard-node-modules:/app/node_modules
    depends_on:
      - mcp-server
    networks:
      - em-network
    restart: unless-stopped
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"

  # ===================
  # Redis (Cache & Rate Limiting)
  # ===================
  redis:
    container_name: em-redis
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis-data:/data
    networks:
      - em-network
    restart: unless-stopped

  # ===================
  # Anvil (Local Blockchain)
  # ===================
  anvil:
    container_name: em-anvil
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "2"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8545:8545"
    networks:
      - em-network
    restart: unless-stopped

networks:
  em-network:
    driver: bridge

volumes:
  redis-data:
  dashboard-node-modules:
