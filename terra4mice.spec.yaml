# terra4mice.spec.yaml — Execution Market
# Human Execution Layer for AI Agents
# Agent #469 on ERC-8004 Identity Registry
#
# Run: cd /mnt/z/ultravioleta/dao/terra4mice && python -m terra4mice plan /mnt/z/ultravioleta/dao/execution-market

version: "1"

resources:

  # ─────────────────────────────────────────────
  # FEATURES — high-level platform capabilities
  # ─────────────────────────────────────────────
  feature:
    task_lifecycle:
      attributes:
        description: "Full task lifecycle: publish, accept, submit, approve/reject, cancel, expire"
        statuses: [published, accepted, in_progress, submitted, verifying, completed, cancelled, expired, disputed]
        categories: [physical_presence, knowledge_access, human_authority, simple_action, digital_physical]
      files:
        - mcp_server/api/routes.py
        - mcp_server/server.py
        - mcp_server/models.py
        - dashboard/src/services/tasks.ts
        - dashboard/src/pages/Tasks.tsx
        - dashboard/src/pages/TaskDetail.tsx
        - dashboard/src/components/TaskBrowser.tsx
        - dashboard/src/components/TaskCard.tsx
        - dashboard/src/components/TaskList.tsx
        - dashboard/src/components/TaskApplicationModal.tsx
      tests:
        - mcp_server/tests/test_mcp_tools.py
        - mcp_server/tests/test_p0_routes_idempotency.py
        - mcp_server/tests/test_task_expiration_job.py
        - e2e/tests/tasks.spec.ts
      depends_on: []

    x402_payments:
      attributes:
        description: "x402 payment protocol: EIP-3009 verify+settle via Ultravioleta Facilitator"
        flow: "Agent signs EIP-3009 → SDK → Facilitator → On-chain TX (gasless)"
        network: base_mainnet
        token: USDC
        platform_fee: "8%"
        operations: [verify, settle, refund]
      files:
        - mcp_server/integrations/x402/sdk_client.py
        - mcp_server/integrations/x402/client.py
        - mcp_server/integrations/x402/escrow.py
        - mcp_server/integrations/x402/merchant.py
        - mcp_server/api/escrow.py
        - dashboard/src/hooks/usePayment.ts
        - dashboard/src/hooks/usePayments.ts
        - dashboard/src/hooks/useTaskPayment.ts
        - dashboard/src/hooks/useEscrow.ts
        - dashboard/src/services/payments.ts
        - dashboard/src/components/PaymentStatus.tsx
        - dashboard/src/components/PaymentStatusBadge.tsx
        - dashboard/src/components/PaymentHistory.tsx
      tests:
        - mcp_server/integrations/x402/test_client.py
        - mcp_server/tests/test_escrow.py
        - mcp_server/tests/test_fees.py
        - scripts/test-x402-full-flow.ts
        - scripts/test-x402-e2e.ts
        - scripts/test-x402-rapid-flow.ts
        - scripts/test-escrow-flow.ts
      depends_on:
        - feature.task_lifecycle
        - datasource.facilitator

    worker_auth:
      attributes:
        description: "Worker authentication via Dynamic.xyz wallet connect"
        provider: dynamic_xyz
        flow: "Dynamic verifies wallet → AuthContext fetches executor by wallet_address"
        environment_id: db513515-7317-46d6-b401-e0695f104481
      files:
        - dashboard/src/context/AuthContext.tsx
        - dashboard/src/hooks/useAuth.ts
        - dashboard/src/hooks/useWallet.ts
        - dashboard/src/hooks/useWalletAuth.ts
        - dashboard/src/providers/DynamicProvider.tsx
        - dashboard/src/components/DynamicWalletButton.tsx
        - dashboard/src/components/AuthModal.tsx
      tests:
        - e2e/tests/auth.spec.ts
        - e2e/tests/auth.setup.ts
      depends_on:
        - datasource.dynamic_xyz

    agent_auth:
      attributes:
        description: "Agent authentication via API key in X-API-Key header"
        storage: supabase_api_keys_table
        hash_algorithm: sha256
      files:
        - mcp_server/api/auth.py
        - mcp_server/api/middleware.py
      tests:
        - mcp_server/tests/test_admin_auth.py
      depends_on: []

    erc8004_identity:
      attributes:
        description: "On-chain agent/worker identity via ERC-8004 registry"
        agent_id: 469
        registry_mainnet: "0x8004A169FB4a3325136EB29fA0ceB6D2e539a432"
        registry_testnet: "0x8004A818BFB912233c491871b3d84c89A494BD9e"
        operations: [get_identity, register_agent, confirm_registration]
      files:
        - mcp_server/integrations/erc8004/identity.py
        - mcp_server/integrations/erc8004/facilitator_client.py
        - mcp_server/integrations/erc8004/__init__.py
        - dashboard/src/hooks/useIdentity.ts
        - scripts/register_erc8004.ts
        - scripts/register-erc8004-base.ts
      tests: []
      depends_on:
        - datasource.facilitator

    erc8004_reputation:
      attributes:
        description: "On-chain reputation feedback via ERC-8004 reputation registry"
        reputation_registry: "0x8004BAa17C55a88189AE136b182e5fdA19dE9b63"
        operations: [submit_feedback, rate_worker, rate_agent, get_reputation]
      files:
        - mcp_server/integrations/erc8004/reputation.py
        - mcp_server/integrations/erc8004/facilitator_client.py
        - mcp_server/api/reputation.py
        - dashboard/src/services/reputation.ts
        - dashboard/src/components/WorkerRatingModal.tsx
        - dashboard/src/components/WorkerReputationBadge.tsx
      tests:
        - mcp_server/tests/test_reputation.py
        - mcp_server/tests/test_reputation_ownership.py
      depends_on:
        - feature.erc8004_identity
        - feature.task_lifecycle

    evidence_verification:
      attributes:
        description: "Multi-layer evidence verification: AI review, GPS antispoofing, attestation"
        ai_model: claude_sonnet_vision
        evidence_types: [photo, gps, receipt, screenshot, document, video, text]
        mock_mode: "true when ANTHROPIC_API_KEY not set"
      files:
        - mcp_server/verification/ai_review.py
        - mcp_server/verification/gps_antispoofing.py
        - mcp_server/verification/attestation.py
        - mcp_server/verification/__init__.py
        - dashboard/src/components/EvidenceUpload.tsx
        - dashboard/src/components/SubmissionForm.tsx
        - dashboard/src/components/CameraCapture.tsx
        - dashboard/src/services/submissions.ts
      tests:
        - mcp_server/tests/test_gps.py
        - mcp_server/tests/test_gps_antispoofing.py
        - mcp_server/tests/test_safety.py
        - e2e/tests/evidence.spec.ts
      depends_on:
        - feature.task_lifecycle

    websocket_notifications:
      attributes:
        description: "Real-time task updates via WebSocket"
        endpoint: "WS /ws"
        events: [task_created, task_accepted, submission_received, task_completed]
      files:
        - mcp_server/websocket/server.py
        - mcp_server/websocket/handlers.py
        - mcp_server/websocket/events.py
        - mcp_server/websocket/client.py
        - mcp_server/websocket/integration.py
        - mcp_server/websocket/__init__.py
        - dashboard/src/hooks/useNotifications.ts
        - dashboard/src/components/NotificationBell.tsx
      tests:
        - mcp_server/tests/test_websocket.py
        - mcp_server/tests/test_websocket_module.py
        - mcp_server/tests/test_websocket_auth_hardening.py
      depends_on: []

    mcp_transport:
      attributes:
        description: "MCP Streamable HTTP transport for AI agent tool invocation"
        endpoint: "POST /mcp/"
        tools: [em_publish_task, em_get_tasks, em_get_task, em_check_submission, em_approve_submission, em_cancel_task, em_get_fee_structure, em_calculate_fee, em_server_status]
      files:
        - mcp_server/server.py
        - mcp_server/main.py
      tests:
        - mcp_server/tests/test_mcp_tools.py
      depends_on:
        - feature.task_lifecycle
        - feature.agent_auth

    a2a_discovery:
      attributes:
        description: "Agent-to-agent discovery via well-known agent card"
        endpoints: ["GET /.well-known/agent.json", "GET /v1/card", "GET /discovery/agents"]
      files:
        - mcp_server/a2a/agent_card.py
        - mcp_server/a2a/__init__.py
        - agent-card.json
      tests:
        - mcp_server/tests/test_a2a.py
      depends_on: []

    admin_platform:
      attributes:
        description: "Admin dashboard for platform management, config, audit, analytics"
        url: admin.execution.market
        auth: admin_api_key
      files:
        - mcp_server/api/admin.py
        - mcp_server/config/platform_config.py
        - admin-dashboard/src/App.tsx
        - admin-dashboard/src/pages/Tasks.tsx
        - admin-dashboard/src/pages/Payments.tsx
        - admin-dashboard/src/pages/Users.tsx
        - admin-dashboard/src/pages/Settings.tsx
        - admin-dashboard/src/pages/Analytics.tsx
        - admin-dashboard/src/pages/AuditLog.tsx
      tests:
        - mcp_server/tests/test_admin_auth.py
        - mcp_server/tests/test_platform_config.py
      depends_on:
        - feature.agent_auth

    worker_profile:
      attributes:
        description: "Worker profile management: skills, location, reputation, earnings"
        fields: [display_name, email, phone, skills, languages, timezone, wallet_address, reputation_score]
      files:
        - dashboard/src/pages/Profile.tsx
        - dashboard/src/hooks/useProfile.ts
        - dashboard/src/hooks/useProfileUpdate.ts
        - dashboard/src/components/ProfileCompletionModal.tsx
        - dashboard/src/components/OnboardingFlow.tsx
        - dashboard/src/components/SkillSelector.tsx
      tests: []
      depends_on:
        - feature.worker_auth

    agent_dashboard:
      attributes:
        description: "Agent analytics dashboard: task management, submissions, payments"
      files:
        - dashboard/src/pages/AgentDashboard.tsx
        - dashboard/src/pages/AgentOnboarding.tsx
      tests:
        - e2e/tests/agent.spec.ts
      depends_on:
        - feature.task_lifecycle
        - feature.agent_auth

    monitoring:
      attributes:
        description: "Health checks, metrics, alerts for platform observability"
        probes: [health, live, ready, startup, metrics, version]
        components: [supabase, x402, erc8004, websocket]
      files:
        - mcp_server/api/health.py
        - mcp_server/monitoring/metrics.py
        - mcp_server/monitoring/alerts.py
        - mcp_server/monitoring/__init__.py
        - mcp_server/health/endpoints.py
      tests: []
      depends_on: []

    describenet_seals:
      attributes:
        description: "DescribeNet integration for verifiable credential seals"
        seal_types: [worker, requester, badge]
      files:
        - mcp_server/integrations/describenet/client.py
        - mcp_server/integrations/describenet/seals.py
        - mcp_server/integrations/describenet/worker_seals.py
        - mcp_server/integrations/describenet/requester_seals.py
        - mcp_server/integrations/describenet/badges.py
        - mcp_server/integrations/describenet/__init__.py
      tests:
        - mcp_server/tests/test_seals.py
      depends_on: []

    superfluid_streaming:
      attributes:
        description: "Superfluid integration for streaming payments (future)"
        status: planned
      files:
        - mcp_server/integrations/superfluid/client.py
        - mcp_server/integrations/superfluid/streams.py
        - mcp_server/integrations/superfluid/__init__.py
      tests: []
      depends_on:
        - feature.x402_payments

  # ─────────────────────────────────────────────
  # ENDPOINTS — REST API routes
  # ─────────────────────────────────────────────
  endpoint:
    # --- Agent task CRUD ---
    create_task:
      attributes:
        method: POST
        path: /api/v1/tasks
        auth: api_key
        payment: x402_header
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle
        - feature.x402_payments

    list_agent_tasks:
      attributes:
        method: GET
        path: /api/v1/tasks
        auth: api_key
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    get_task:
      attributes:
        method: GET
        path: /api/v1/tasks/{id}
        auth: api_key
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    batch_create_tasks:
      attributes:
        method: POST
        path: /api/v1/tasks/batch
        auth: api_key
        max_tasks: 50
      files:
        - mcp_server/api/routes.py
      depends_on:
        - endpoint.create_task

    cancel_task:
      attributes:
        method: POST
        path: /api/v1/tasks/{id}/cancel
        auth: api_key
        refund: automatic
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle
        - feature.x402_payments

    get_submissions:
      attributes:
        method: GET
        path: /api/v1/tasks/{id}/submissions
        auth: api_key
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    approve_submission:
      attributes:
        method: POST
        path: /api/v1/submissions/{id}/approve
        auth: api_key
        triggers: [payment_settlement, reputation_feedback]
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.x402_payments
        - feature.erc8004_reputation

    reject_submission:
      attributes:
        method: POST
        path: /api/v1/submissions/{id}/reject
        auth: api_key
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    agent_analytics:
      attributes:
        method: GET
        path: /api/v1/analytics
        auth: api_key
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    # --- Worker endpoints ---
    register_worker:
      attributes:
        method: POST
        path: /api/v1/executors/register
        auth: none
      files:
        - mcp_server/api/routes.py
      depends_on: []

    browse_available_tasks:
      attributes:
        method: GET
        path: /api/v1/tasks/available
        auth: none
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    apply_to_task:
      attributes:
        method: POST
        path: /api/v1/tasks/{id}/apply
        auth: worker_wallet
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle
        - feature.worker_auth

    submit_work:
      attributes:
        method: POST
        path: /api/v1/tasks/{id}/submit
        auth: worker_wallet
        evidence: multipart
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle
        - feature.evidence_verification

    worker_tasks:
      attributes:
        method: GET
        path: /api/v1/executors/{id}/tasks
        auth: worker_wallet
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    worker_stats:
      attributes:
        method: GET
        path: /api/v1/executors/{id}/stats
        auth: worker_wallet
      files:
        - mcp_server/api/routes.py
      depends_on:
        - feature.task_lifecycle

    # --- Evidence ---
    verify_evidence:
      attributes:
        method: POST
        path: /api/v1/evidence/verify
        auth: worker_wallet
        ai_model: claude_sonnet_vision
      files:
        - mcp_server/api/routes.py
        - mcp_server/verification/ai_review.py
      depends_on:
        - feature.evidence_verification

    # --- Escrow ---
    escrow_config:
      attributes:
        method: GET
        path: /api/v1/escrow/config
      files:
        - mcp_server/api/escrow.py
      depends_on:
        - feature.x402_payments

    escrow_balance:
      attributes:
        method: GET
        path: /api/v1/escrow/balance
      files:
        - mcp_server/api/escrow.py
      depends_on:
        - feature.x402_payments

    escrow_release:
      attributes:
        method: POST
        path: /api/v1/escrow/release
        auth: api_key
      files:
        - mcp_server/api/escrow.py
      depends_on:
        - feature.x402_payments

    escrow_refund:
      attributes:
        method: POST
        path: /api/v1/escrow/refund
        auth: api_key
      files:
        - mcp_server/api/escrow.py
      depends_on:
        - feature.x402_payments

    # --- Reputation ---
    em_reputation:
      attributes:
        method: GET
        path: /api/v1/reputation/em
      files:
        - mcp_server/api/reputation.py
      depends_on:
        - feature.erc8004_reputation

    agent_reputation:
      attributes:
        method: GET
        path: /api/v1/reputation/agents/{id}
      files:
        - mcp_server/api/reputation.py
      depends_on:
        - feature.erc8004_reputation

    rate_worker:
      attributes:
        method: POST
        path: /api/v1/reputation/workers/rate
        auth: api_key
      files:
        - mcp_server/api/reputation.py
      depends_on:
        - feature.erc8004_reputation

    rate_agent:
      attributes:
        method: POST
        path: /api/v1/reputation/agents/rate
        auth: worker_wallet
      files:
        - mcp_server/api/reputation.py
      depends_on:
        - feature.erc8004_reputation

    # --- Admin ---
    admin_verify:
      attributes:
        method: GET
        path: /api/v1/admin/verify
        auth: admin_key
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    admin_stats:
      attributes:
        method: GET
        path: /api/v1/admin/stats
        auth: admin_key
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    admin_tasks:
      attributes:
        method: GET
        path: /api/v1/admin/tasks
        auth: admin_key
        features: [search, filter, pagination]
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    admin_payments:
      attributes:
        method: GET
        path: /api/v1/admin/payments
        auth: admin_key
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    admin_config:
      attributes:
        methods: [GET, PUT]
        path: /api/v1/admin/config
        auth: admin_key
        audit: true
      files:
        - mcp_server/api/admin.py
        - mcp_server/config/platform_config.py
      depends_on:
        - feature.admin_platform

    admin_users:
      attributes:
        methods: [GET]
        paths: [/api/v1/admin/users/agents, /api/v1/admin/users/workers]
        auth: admin_key
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    admin_analytics:
      attributes:
        method: GET
        path: /api/v1/admin/analytics
        auth: admin_key
      files:
        - mcp_server/api/admin.py
      depends_on:
        - feature.admin_platform

    # --- Health ---
    health_check:
      attributes:
        methods: [GET]
        paths: [/health, /health/, /health/live, /health/ready, /health/startup, /health/metrics, /health/version]
      files:
        - mcp_server/api/health.py
        - mcp_server/health/endpoints.py
      depends_on:
        - feature.monitoring

    # --- OpenAPI ---
    swagger_docs:
      attributes:
        paths: [/docs, /redoc]
      files:
        - mcp_server/api/openapi.py
      depends_on: []

  # ─────────────────────────────────────────────
  # MODULES — backend Python packages
  # ─────────────────────────────────────────────
  module:
    api_routes:
      attributes:
        description: "Core REST API: task CRUD, worker registration, submissions"
        route_count: 72
      files:
        - mcp_server/api/routes.py
        - mcp_server/api/__init__.py
      tests:
        - mcp_server/tests/test_p0_routes_idempotency.py
        - mcp_server/tests/test_schema_alignment_applications.py
      depends_on: []

    api_admin:
      attributes:
        description: "Admin REST API: stats, tasks, payments, config, users"
      files:
        - mcp_server/api/admin.py
      tests:
        - mcp_server/tests/test_admin_auth.py
      depends_on:
        - module.api_routes

    x402_sdk_client:
      attributes:
        description: "x402 SDK wrapper using uvd-x402-sdk for gasless payments"
        class: EMX402Client
        sdk_version: ">=0.3.0"
      files:
        - mcp_server/integrations/x402/sdk_client.py
      tests:
        - mcp_server/integrations/x402/test_client.py
      depends_on: []

    x402_facilitator_client:
      attributes:
        description: "Direct HTTP client for Ultravioleta Facilitator (fallback)"
      files:
        - mcp_server/integrations/x402/client.py
      depends_on: []

    x402_escrow_legacy:
      attributes:
        description: "Direct contract calls to x402r escrow (DEPRECATED — use SDK)"
        status: deprecated
      files:
        - mcp_server/integrations/x402/x402r_escrow.py
        - mcp_server/integrations/x402/advanced_escrow_integration.py
      depends_on: []

    erc8004_facilitator:
      attributes:
        description: "ERC-8004 facilitator client: identity, reputation, feedback"
        class: ERC8004FacilitatorClient
      files:
        - mcp_server/integrations/erc8004/facilitator_client.py
        - mcp_server/integrations/erc8004/__init__.py
      depends_on: []

    erc8004_identity_module:
      attributes:
        description: "Worker identity check, registration tx builder"
      files:
        - mcp_server/integrations/erc8004/identity.py
      depends_on:
        - module.erc8004_facilitator

    erc8004_reputation_module:
      attributes:
        description: "Reputation feedback submission after task approval"
      files:
        - mcp_server/integrations/erc8004/reputation.py
      depends_on:
        - module.erc8004_facilitator

    verification_ai:
      attributes:
        description: "AI-powered evidence verification using Claude Vision"
        model: claude_sonnet
        fallback: mock_mode
      files:
        - mcp_server/verification/ai_review.py
      depends_on: []

    verification_gps:
      attributes:
        description: "GPS anti-spoofing verification for location-based tasks"
      files:
        - mcp_server/verification/gps_antispoofing.py
      tests:
        - mcp_server/tests/test_gps.py
        - mcp_server/tests/test_gps_antispoofing.py
      depends_on: []

    verification_attestation:
      attributes:
        description: "Evidence attestation and tamper-proofing"
      files:
        - mcp_server/verification/attestation.py
      depends_on: []

    websocket_server:
      attributes:
        description: "WebSocket server for real-time task notifications"
        endpoint: "WS /ws"
      files:
        - mcp_server/websocket/server.py
        - mcp_server/websocket/handlers.py
        - mcp_server/websocket/events.py
        - mcp_server/websocket/client.py
        - mcp_server/websocket/integration.py
      tests:
        - mcp_server/tests/test_websocket.py
        - mcp_server/tests/test_websocket_module.py
        - mcp_server/tests/test_websocket_auth_hardening.py
      depends_on: []

    platform_config:
      attributes:
        description: "Dynamic platform configuration with audit logging"
        storage: supabase_platform_config_table
      files:
        - mcp_server/config/platform_config.py
        - mcp_server/config/__init__.py
      tests:
        - mcp_server/tests/test_platform_config.py
      depends_on: []

    monitoring_module:
      attributes:
        description: "Prometheus metrics, alerts, health endpoints"
      files:
        - mcp_server/monitoring/metrics.py
