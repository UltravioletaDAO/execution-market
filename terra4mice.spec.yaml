    ecr_mcp_server:
      attributes:
        description: "ECR repository for MCP server container"
        repo: em-production-mcp-server
        tag: latest
      depends_on: []

    alb:
      attributes:
        description: "Application Load Balancer with HTTPS termination"
        rules:
          - priority: 97
            host: admin.execution.market
          - priority: 99
            host: api.execution.market
          - priority: 100
            host: mcp.execution.market
          - priority: default
            host: execution.market
      depends_on:
        - infra.ecs_cluster

    route53:
      attributes:
        description: "DNS zone for execution.market"
        records: [execution.market, api.execution.market, mcp.execution.market, admin.execution.market]
      depends_on: []

    acm_cert:
      attributes:
        description: "Wildcard ACM certificate for *.execution.market"
        domain: "*.execution.market"
      depends_on:
        - infra.route53

    github_actions:
      attributes:
        description: "CI/CD pipeline: auto-deploy on push to main"
        workflow: deploy.yml
      files:
        - .github/workflows/deploy.yml
      depends_on:
        - infra.ecs_cluster
        - infra.ecr_dashboard
        - infra.ecr_mcp_server

