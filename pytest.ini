[pytest]
# Root-level pytest config for the execution-market monorepo.
# Each sub-project (mcp_server, em-plugin-sdk) has its own config;
# this file provides sensible defaults when running from root.
testpaths = mcp_server/tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude e2e tests by default (they need network access)
addopts = --ignore=mcp_server/tests/e2e --ignore=em-plugin-sdk
