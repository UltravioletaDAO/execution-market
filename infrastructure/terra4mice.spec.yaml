    payment_ui_wiring:
      attributes:
        description: "Wire PaymentStatusBadge + TxHashLink into TaskDetail, AgentDashboard, SubmissionReview"
        batch: 1
      files:
        - dashboard/src/components/PaymentStatusBadge.tsx
        - dashboard/src/components/TxHashLink.tsx
        - dashboard/src/pages/TaskDetail.tsx
        - dashboard/src/pages/AgentDashboard.tsx

    # --- Batch 2: Landing & Auth ---
    public_task_browser:
      attributes:
        description: "PublicTaskBrowser fallback for unauthenticated users"
        batch: 2
      files:
        - dashboard/src/components/TaskBrowser.tsx
        - dashboard/src/pages/Home.tsx

    dynamic_xyz_auth:
      attributes:
        description: "Dynamic.xyz wallet auth with session persistence"
        batch: 2
      files:
        - dashboard/src/providers/DynamicProvider.tsx
        - dashboard/src/context/AuthContext.tsx
