  # ═══════════════════════════════════════════════════════════════════════
  # PHASE 7: MULTI-CHAIN EXPANSION
  # SDK: uvd-x402-sdk 0.8.2 (Python) / 2.20.0 (TypeScript)
  # Facilitator v1.29.0: 21 payment networks, 14 identity networks
  #
  # PAYMENT SUPPORT MATRIX (x402 + ERC-8004):
  # ┌─────────────┬───────┬──────┬──────┬───────┬──────┬─────────┐
  # │ Network     │ USDC  │ EURC │ AUSD │ PYUSD │ USDT │ ERC8004 │
  # ├─────────────┼───────┼──────┼──────┼───────┼──────┼─────────┤
  # │ Base        │ ✓     │ ✓    │      │       │      │ ✓       │
  # │ Ethereum    │ ✓     │ ✓    │ ✓    │ ✓     │      │ ✓       │
  # │ Polygon     │ ✓     │      │ ✓    │       │      │ ✓       │
  # │ Arbitrum    │ ✓     │      │ ✓    │       │ ✓    │ ✓       │
  # │ Avalanche   │ ✓     │ ✓    │ ✓    │       │      │ ✓       │
  # │ Celo        │ ✓     │      │      │       │ ✓    │ ✓       │
  # │ Monad       │ ✓     │      │ ✓    │       │      │ ✓       │
  # │ BSC         │       │      │      │       │      │ ✓ only  │
  # │ Optimism    │ ✓     │      │      │       │ ✓    │         │
  # │ HyperEVM    │ ✓     │      │      │       │      │         │
  # │ Unichain    │ ✓     │      │      │       │      │         │
  # │ Scroll      │ ✓     │      │      │       │      │         │
  # │ SKALE       │ ✓     │      │      │       │      │         │
  # │ Solana      │ ✓     │      │ ✓    │       │      │         │
  # │ NEAR        │ ✓     │      │      │       │      │         │
  # │ Stellar     │ ✓     │      │      │       │      │         │
  # │ Algorand    │ ✓     │      │      │       │      │         │
  # │ Sui         │ ✓     │      │ ✓    │       │      │         │
  # │ Fogo        │ ✓     │      │      │       │      │         │
  # └─────────────┴───────┴──────┴──────┴───────┴──────┴─────────┘
  # ═══════════════════════════════════════════════════════════════════════

  expansion:

    # --- Phase 7A: Gasless Identity Registration ---

    gasless_agent_registration:
      attributes:
        description: "Agents register on ERC-8004 via facilitator (gasless). MCP API endpoint POST /api/v1/identity/register"
        phase: "7A"
        priority: P1
        sdk_python: "uvd-x402-sdk>=0.8.2 → Erc8004Client.register_agent()"
        sdk_ts: "uvd-x402-sdk@2.20.0 → Erc8004Client.registerAgent()"
        networks: "ethereum, base-mainnet, polygon, arbitrum, celo, bsc, monad + 5 testnets"
        notes: "Facilitator pays gas. Agent gets ERC-721 NFT. Optional recipient delegation."
      files:
        - mcp_server/integrations/erc8004/identity.py
        - mcp_server/api/routes.py

    gasless_worker_registration:
      attributes:
        description: "Workers register ERC-8004 identity via dashboard (gasless, no wallet needed for gas)"
        phase: "7A"
        priority: P1
        flow: "Worker clicks Register → Dashboard calls MCP → MCP calls facilitator /register → Worker gets agent ID"
        networks: "base-mainnet default, user can pick any"
      files:
        - dashboard/src/hooks/useIdentity.ts
        - mcp_server/integrations/erc8004/identity.py

    multichain_identity_verification:
      attributes:
        description: "Accept ERC-8004 identity from ANY of 14 supported networks"
        phase: "7A"
        priority: P1
        agent_verification: "ALREADY WORKS — verify_agent_identity() passes network param to facilitator, which handles all 14 networks"
        worker_check: "BLOCKED — check_worker_identity() does direct RPC only to Base. Needs multi-chain RPC or switch to facilitator-based lookup"
        contracts_dict: "COSMETIC — ERC8004_CONTRACTS in facilitator_client.py only has 3 entries, used for health/display only"
        remaining: "1) Expand ERC8004_CONTRACTS dict for display. 2) Switch worker identity check to facilitator-based (no direct RPC). 3) Store network+agentId in executor profile."
      files:
        - mcp_server/integrations/erc8004/identity.py
        - mcp_server/integrations/erc8004/facilitator_client.py

    identity_metadata_api:
      attributes:
        description: "Read/write agent metadata via facilitator (name, version, capabilities)"
        phase: "7A"
        priority: P2
        sdk: "Erc8004Client.get_identity_metadata(network, agentId, key)"
      files:
        - mcp_server/integrations/erc8004/facilitator_client.py

    # --- Phase 7B: Multi-Chain Payments ---

    multichain_payment_config:
      attributes:
        description: "Network-aware USDC address lookup. sdk_client resolves token addresses per network."
        phase: "7B"
        priority: P1
        current: "Hardcoded Base USDC 0x8335... and chain_id 8453"
        target: "Token address registry keyed by (network, token_symbol). Agent specifies network at task creation."
        evm_networks_13: "base(8453), ethereum(1), polygon(137), arbitrum(42161), optimism(10), avalanche(43114), celo(42220), hyperevm(999), unichain(130), monad(143), scroll(534352), skale(1187947933)"
        evm_with_erc8004_7: "base, ethereum, polygon, arbitrum, avalanche, celo, monad (both payments + identity)"
        evm_payments_only_6: "optimism, hyperevm, unichain, scroll, skale (payments, no identity)"
      files:
        - mcp_server/integrations/x402/sdk_client.py
        - mcp_server/api/routes.py
        - mcp_server/models.py

    task_network_field:
      attributes:
        description: "Add 'network' column to tasks table. Each task specifies which chain its bounty is on."
        phase: "7B"
        priority: P1
        migration: "023_add_network_to_tasks.sql"
        default: "base"
      files:
        - supabase/migrations/023_add_network_to_tasks.sql
        - mcp_server/models.py

    multichain_settlement:
      attributes:
        description: "Settle payments on the same chain the task was created on"
        phase: "7B"
        priority: P1
        flow: "Task has network=polygon → approve uses Polygon USDC → facilitator settles on Polygon"
      files:
        - mcp_server/integrations/x402/sdk_client.py

    dashboard_network_selector:
      attributes:
        description: "Dashboard shows network badge on tasks. Workers see which chain pays."
        phase: "7B"
        priority: P2
      files:
        - dashboard/src/components/TaskBrowser.tsx
        - dashboard/src/pages/TaskDetail.tsx

    # --- Phase 7C: Multi-Token Support ---

    multitoken_config:
      attributes:
        description: "Token address registry for 5 stablecoins across all networks"
        phase: "7C"
        priority: P2
        usdc: "ALL networks (21) — primary stablecoin, 6 decimals"
        eurc: "Base (0x60a3E35C...), Ethereum (0x1aBaEA1f...), Avalanche (0xC891EB4c...) — 6 decimals"
        ausd: "Ethereum, Polygon, Arbitrum, Avalanche, Monad, Solana, Sui — (0x000000...eFE302) — 6 decimals"
        pyusd: "Ethereum only (0x6c3ea903...) — 6 decimals"
        usdt: "Arbitrum (0xFd086bC7...), Optimism (0x01bff417...), Celo (0x48065fBB...) — 6 decimals"
      files:
        - mcp_server/integrations/x402/sdk_client.py
        - mcp_server/models.py

    task_token_field:
      attributes:
        description: "payment_token column already exists in tasks table. Agents specify token symbol."
        phase: "7C"
        priority: P2
        notes: "payment_token VARCHAR already in 001_initial_schema.sql. Just need to validate against supported tokens per network."
      files:
        - mcp_server/api/routes.py

    # --- Phase 7D: Additional EVM Networks (Payments Only) ---

    optimism_payments:
      attributes:
        description: "Accept Optimism USDC/USDT payments (no ERC-8004 identity on Optimism)"
        phase: "7D"
        priority: P2
        chain_id: 10
        usdc: "0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85"
        usdt: "0x01bff41798a0bcf287b996046ca68b395dbc1071"

    hyperevm_payments:
      attributes:
        description: "Accept HyperEVM USDC payments"
        phase: "7D"
        priority: P3
        chain_id: 999
        usdc: "0xb88339CB7199b77E23DB6E890353E22632Ba630f"

    unichain_payments:
      attributes:
        description: "Accept Unichain USDC payments"
        phase: "7D"
        priority: P3
        chain_id: 130
        usdc: "0x078d782b760474a361dda0af3839290b0ef57ad6"

    scroll_payments:
      attributes:
        description: "Accept Scroll USDC payments"
        phase: "7D"
        priority: P3
        chain_id: 534352
        usdc: "0x06eFdBFf2a14a7c8E15944D1F4A48F9F95F663A4"

    skale_payments:
      attributes:
