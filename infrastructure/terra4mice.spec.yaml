        - mcp_server/integrations/x402/sdk_client.py
        - mcp_server/integrations/x402/client.py
        - mcp_server/integrations/x402/escrow.py
        - mcp_server/integrations/x402/merchant.py
      tests:
        - mcp_server/tests/test_x402_client.py
        - scripts/test-x402-rapid-flow.ts

    split_payment:
      attributes:
        description: "Dual EIP-3009 split payment: agent→worker (87%) + agent→treasury (13%)"
        batch: 4
        fix_id: D00
        evidence_tx: "0xf12878ae320784f4635bc8dfc7dfebb3524d74df63eefb7d47220334002cbe03"
      files:
        - mcp_server/integrations/x402/sdk_client.py

    self_payment_check:
      attributes:
        description: "Block payments where worker wallet == agent wallet"
        batch: 5
        fix_id: D01
      files:
        - mcp_server/integrations/x402/sdk_client.py

    agent_auth_settlement:
      attributes:
        description: "Settle agent's original EIP-3009 auth before disbursing"
        batch: 5
        fix_id: D14
      files:
        - mcp_server/integrations/x402/sdk_client.py

    settlement_method_tracking:
      attributes:
        description: "Track settlement_method (x402_facilitator, manual, etc) in DB"
        batch: 3
      files:
        - supabase/migrations/016_add_settlement_method.sql

    orphaned_payment_alerts:
      attributes:
        description: "SQL view for orphaned payment detection"
        batch: 4
      files:
        - supabase/migrations/017_orphaned_payment_alerts.sql

    auto_payment_retry:
      attributes:
        description: "Retry logic for failed auto-payments"
        batch: 4
      files:
