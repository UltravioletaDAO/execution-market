    <!-- Inline critical CSS -->
    <style>
      /* Prevent flash of unstyled content */
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Core typography */
      :root {
        font-family: 'Roboto Mono', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* Prevent pull-to-refresh during camera capture */
      html, body {
        overscroll-behavior-y: contain;
      }

      /* Safe area insets for notched devices */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }

      /* Dark mode detection for initial load */
      :root {
        color-scheme: light dark;
      }

      /* Loading state */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background: #fafafa;
      }

      .dark #root:empty,
      @media (prefers-color-scheme: dark) {
        #root:empty {
          background: #09090b;
        }
      }

      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #e4e4e7;
        border-top-color: #111111;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .dark #root:empty::after,
      @media (prefers-color-scheme: dark) {
        #root:empty::after {
          border-color: #3f3f46;
          border-top-color: #fafafa;
        }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Shimmer animation for skeleton loading */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .animate-shimmer {
        animation: shimmer 1.5s infinite;
      }
    </style>

    <!-- Theme detection script (runs before body to prevent flash) -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('em-theme');
          var theme = stored;

          if (!theme || theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }

          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }

          document.documentElement.style.colorScheme = theme;

          // Update theme-color meta tag
          var metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
          }
        } catch (e) {
          console.error('Theme detection error:', e);
        }
      })();
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[SW] Registered:', reg.scope);

              // Check for updates
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New content available, notify user
                    console.log('[SW] New content available');
                    window.dispatchEvent(new CustomEvent('sw-update-available'));
                  }
                });
              });
            })
            .catch(function(err) {
              console.error('[SW] Registration failed:', err);
            });
        });
      }
    </script>
