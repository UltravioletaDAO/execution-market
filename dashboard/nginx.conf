server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # A2A agent card: proxy to API backend so protocol clients
    # get the real JSON instead of SPA index.html.
    location = /.well-known/agent.json {
        return 301 https://api.execution.market/.well-known/agent.json;
    }

    # Canonical API domain guardrail:
    # prevent execution.market/api/* from silently returning SPA HTML.
    location = /api {
        return 308 https://api.execution.market/api;
    }

    location ^~ /api/ {
        return 308 https://api.execution.market$request_uri;
    }

    # On-chain reputation feedback JSON — proxied from S3/CloudFront evidence store.
    # feedbackURIs on ERC-8004 ReputationRegistry use execution.market/feedback/...
    # instead of raw CloudFront URLs. The JSON is immutable once created.
    location /feedback/ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $evidence_cdn "d3h6yzj24t9k8z.cloudfront.net";
        proxy_pass https://$evidence_cdn;
        proxy_set_header Host $evidence_cdn;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_intercept_errors on;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;

        # Feedback docs are immutable — cache aggressively
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Content-Type "application/json";
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker - no cache
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest - short cache
    location /manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA routing - all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
