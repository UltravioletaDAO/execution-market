<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Chamba</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94A3B8;
      margin-bottom: 1.5rem;
      max-width: 300px;
    }
    button {
      background: #3B82F6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:active { background: #1D4ED8; }
    .pending {
      margin-top: 2rem;
      padding: 1rem;
      background: #1E293B;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Check your internet connection and try again. Your work is saved locally.</p>
  <button onclick="location.reload()">Try Again</button>
  <div class="pending" id="pending"></div>
  <script>
    // Check for pending uploads
    if ('indexedDB' in window) {
      const request = indexedDB.open('chamba-offline', 1);
      request.onsuccess = () => {
        const db = request.result;
        if (db.objectStoreNames.contains('pending-uploads')) {
          const tx = db.transaction('pending-uploads', 'readonly');
          const req = tx.objectStore('pending-uploads').count();
          req.onsuccess = () => {
            if (req.result > 0) {
              document.getElementById('pending').textContent =
                `${req.result} upload(s) pending. They'll sync when you're back online.`;
            }
          };
        }
      };
    }
  </script>
</body>
</html>
