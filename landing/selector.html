<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1DJV1BRXHR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1DJV1BRXHR');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Market Landing - Version Selector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto Mono', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e4e4e7;
            padding: 16px 24px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 500;
            color: #52525b;
        }

        .header h1 span {
            color: #111111;
            font-weight: 700;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .view-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 0;
            padding: 4px;
        }

        .view-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #71717a;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.2s;
        }

        .view-btn:hover {
            color: #18181b;
        }

        .view-btn.active {
            background: #111111;
            color: white;
        }

        .version-toggle {
            display: flex;
            gap: 8px;
        }

        .version-btn {
            padding: 8px 20px;
            border: 1px solid #d4d4d8;
            background: transparent;
            color: #52525b;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.2s;
        }

        .version-btn:hover {
            border-color: #a1a1aa;
            background: #fafafa;
        }

        .version-btn.active {
            border-color: #111111;
            background: #111111;
            color: #ffffff;
        }

        .version-btn.cyberpunk.active {
            border-color: #111111;
            background: #111111;
            color: #ffffff;
        }

        .version-btn.enterprise.active {
            border-color: #111111;
            background: #111111;
            color: #ffffff;
        }

        /* Main content */
        .main {
            padding-top: 72px;
            height: 100vh;
        }

        /* Split View */
        .split-view {
            display: none;
            height: calc(100vh - 72px);
        }

        .split-view.active {
            display: flex;
        }

        .split-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e4e4e7;
        }

        .split-pane:last-child {
            border-right: none;
        }

        .pane-header {
            padding: 12px 20px;
            background: #fafafa;
            border-bottom: 1px solid #e4e4e7;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pane-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .pane-dot.cyberpunk {
            background: #111111;
            box-shadow: none;
        }

        .pane-dot.enterprise {
            background: #52525b;
            box-shadow: none;
        }

        .pane-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #18181b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pane-subtitle {
            font-size: 0.75rem;
            color: #71717a;
            margin-left: auto;
        }

        .split-pane iframe {
            flex: 1;
            border: none;
            width: 100%;
        }

        /* Single View */
        .single-view {
            display: none;
            height: calc(100vh - 72px);
        }

        .single-view.active {
            display: block;
        }

        .single-view iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                padding: 12px 16px;
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
            }

            .main {
                padding-top: 120px;
            }

            .split-view.active {
                flex-direction: column;
            }

            .split-pane {
                border-right: none;
                border-bottom: 1px solid #e4e4e7;
                height: 50%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><span>Execution Market</span> Landing Versions</h1>
        <div class="controls">
            <div class="view-toggle">
                <button class="view-btn active" data-view="split">Split View</button>
                <button class="view-btn" data-view="single">Single View</button>
            </div>
            <div class="version-toggle" id="versionToggle" style="display: none;">
                <button class="version-btn cyberpunk active" data-version="cyberpunk">Cyberpunk</button>
                <button class="version-btn enterprise" data-version="enterprise">Enterprise</button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Split View -->
        <div class="split-view active" id="splitView">
            <div class="split-pane">
                <div class="pane-header">
                    <div class="pane-dot cyberpunk"></div>
                    <span class="pane-title">Cyberpunk / Community</span>
                    <span class="pane-subtitle">index.html</span>
                </div>
                <iframe src="index.html"></iframe>
            </div>
            <div class="split-pane">
                <div class="pane-header">
                    <div class="pane-dot enterprise"></div>
                    <span class="pane-title">Enterprise / Business</span>
                    <span class="pane-subtitle">enterprise.html</span>
                </div>
                <iframe src="enterprise.html"></iframe>
            </div>
        </div>

        <!-- Single View -->
        <div class="single-view" id="singleView">
            <iframe id="singleFrame" src="index.html"></iframe>
        </div>
    </main>

    <script>
        // View toggle (split/single)
        const viewBtns = document.querySelectorAll('.view-btn');
        const splitView = document.getElementById('splitView');
        const singleView = document.getElementById('singleView');
        const versionToggle = document.getElementById('versionToggle');

        viewBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                viewBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (btn.dataset.view === 'split') {
                    splitView.classList.add('active');
                    singleView.classList.remove('active');
                    versionToggle.style.display = 'none';
                } else {
                    splitView.classList.remove('active');
                    singleView.classList.add('active');
                    versionToggle.style.display = 'flex';
                }
            });
        });

        // Version toggle (cyberpunk/enterprise)
        const versionBtns = document.querySelectorAll('.version-btn');
        const singleFrame = document.getElementById('singleFrame');

        versionBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                versionBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (btn.dataset.version === 'cyberpunk') {
                    singleFrame.src = 'index.html';
                } else {
                    singleFrame.src = 'enterprise.html';
                }
            });
        });
    </script>
</body>
</html>
