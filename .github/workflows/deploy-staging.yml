name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY_BACKEND: em-staging-mcp-server
  ECR_REPOSITORY_FRONTEND: em-staging-dashboard
  ECS_CLUSTER: em-staging-cluster
  ECS_SERVICE_BACKEND: em-staging-mcp-server
  ECS_SERVICE_FRONTEND: em-staging-dashboard
  STAGING_URL: https://staging.execution.market
  API_URL: ${{ secrets.STAGING_API_URL }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: ./mcp_server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.STAGING_API_URL }}
            VITE_BUILD_VERSION=${{ github.sha }}

      - name: Output image URIs
        run: |
          echo "backend-image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "frontend-image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition (backend)
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE_BACKEND }} \
            --query taskDefinition > backend-task-def.json

      - name: Update backend task definition
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: mcp-server
          image: ${{ needs.build-and-push.outputs.backend-image }}
          environment-variables: |
            EM_BASE_URL=${{ env.API_URL }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Download task definition (frontend)
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE_FRONTEND }} \
            --query taskDefinition > frontend-task-def.json

      - name: Update frontend task definition
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: dashboard
          image: ${{ needs.build-and-push.outputs.frontend-image }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 30

      - name: Health check - API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_URL }}/health)
          if [ "$response" != "200" ]; then
            echo "API health check failed with status $response"
            exit 1
          fi
          echo "API health check passed"

      - name: Health check - Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.STAGING_URL }})
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status $response"
            exit 1
          fi
          echo "Frontend health check passed"

      - name: Smoke test - Authentication
        run: |
          curl -sf "${{ env.API_URL }}/health/version" > /dev/null
          echo "Version endpoint accessible"

      - name: Smoke test - Tasks endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.API_URL }}/api/v1/tasks/available?limit=1")
          if [ "$response" != "200" ]; then
            echo "Tasks endpoint check failed with status $response"
            exit 1
          fi
          echo "Tasks endpoint accessible"

      - name: Smoke test - Agent card HTTPS URLs
        run: |
          CARD_JSON=$(curl -sf "${{ env.API_URL }}/.well-known/agent.json")
          CARD_URL=$(echo "$CARD_JSON" | jq -r '.url // empty')
          if [[ -z "$CARD_URL" || ! "$CARD_URL" =~ ^https:// ]]; then
            echo "Agent card primary URL is not HTTPS: $CARD_URL"
            exit 1
          fi
          NON_HTTPS_INTERFACES=$(echo "$CARD_JSON" | jq -r '.additionalInterfaces[]?.url // empty' | grep -v '^https://' || true)
          if [[ -n "$NON_HTTPS_INTERFACES" ]]; then
            echo "Agent card has non-HTTPS additional interface URLs:"
            echo "$NON_HTTPS_INTERFACES"
            exit 1
          fi
          echo "Agent card URLs verified as HTTPS"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: always()
    steps:
      - name: Notify Slack - Success
        if: needs.smoke-tests.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Execution Market Staging Deployed* :rocket:\n\nCommit: `${{ github.sha }}`\nBranch: `${{ github.ref_name }}`\nURL: ${{ env.STAGING_URL }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Triggered by: ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: needs.smoke-tests.result == 'failure' || needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Execution Market Staging Deployment Failed* :x:\n\nCommit: `${{ github.sha }}`\nBranch: `${{ github.ref_name }}`\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Triggered by: ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
