name: Execution Market CI/CD

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  MCP_SERVER_ECR_REPO: em-production-mcp-server
  DASHBOARD_ECR_REPO: em-production-dashboard
  ECS_CLUSTER: em-production-cluster
  MCP_SERVER_SERVICE: em-production-mcp-server
  DASHBOARD_SERVICE: em-production-dashboard
  BASE_URL: https://app.execution.market

jobs:
  test-mcp-server:
    name: Test MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mcp_server/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov

      - name: Run linting
        run: ruff check .

      - name: Run type checking
        run: |
          pip install mypy
          mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        continue-on-error: true
        run: |
          pytest -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mcp_server/coverage.xml
          flags: mcp-server
        continue-on-error: true

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run type checking
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm run test:run

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: dashboard/coverage/lcov.info
          flags: dashboard
        continue-on-error: true

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-mcp-server, test-dashboard]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    outputs:
      mcp_server_image: ${{ steps.build-mcp.outputs.image }}
      dashboard_image: ${{ steps.build-dashboard.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP Server
        id: build-mcp
        uses: docker/build-push-action@v5
        with:
          context: ./mcp_server
          file: ./mcp_server/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Dashboard
        id: build-dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.DASHBOARD_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.DASHBOARD_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.BASE_URL }}/api

      - name: Output image tags
        run: |
          echo "mcp_server_image=${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "dashboard_image=${{ env.ECR_REGISTRY }}/${{ env.DASHBOARD_ECR_REPO }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      url: ${{ env.BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download MCP Server task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.MCP_SERVER_SERVICE }} \
            --query taskDefinition > mcp-server-task-def.json

      - name: Update MCP Server task definition
        id: mcp-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: mcp-server-task-def.json
          container-name: ${{ env.MCP_SERVER_SERVICE }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}

      - name: Deploy MCP Server to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.mcp-task-def.outputs.task-definition }}
          service: ${{ env.MCP_SERVER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download Dashboard task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.DASHBOARD_SERVICE }} \
            --query taskDefinition > dashboard-task-def.json

      - name: Update Dashboard task definition
        id: dashboard-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: dashboard-task-def.json
          container-name: ${{ env.DASHBOARD_SERVICE }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.DASHBOARD_ECR_REPO }}:${{ github.sha }}

      - name: Deploy Dashboard to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.dashboard-task-def.outputs.task-definition }}
          service: ${{ env.DASHBOARD_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment health
        run: |
          echo "Waiting for services to stabilize..."
          sleep 30

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BASE_URL }}/api/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status: $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 30

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-mcp-server, test-dashboard, build-and-push, deploy, e2e-tests]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed for commit ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add your notification mechanism here (Slack, Discord, email, etc.)
