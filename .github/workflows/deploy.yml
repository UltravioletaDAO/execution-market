name: Deploy

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  MCP_SERVER_ECR_REPO: em-production-mcp-server
  ECS_CLUSTER: em-production-cluster
  MCP_SERVER_SERVICE: em-production-mcp-server
  MCP_SERVER_CONTAINER: mcp-server
  DASHBOARD_S3_BUCKET: em-production-dashboard
  LAMBDA_RING1_ECR_REPO: em-production-ring1-worker
  LAMBDA_RING2_ECR_REPO: em-production-ring2-worker
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DASHBOARD_CLOUDFRONT_ID }}
  BASE_URL: https://execution.market
  API_URL: https://api.execution.market
  TF_DIR: infrastructure/terraform

jobs:
  # ── Change Detection ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      lambda: ${{ steps.filter.outputs.lambda }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'mcp_server/**'
              - 'Dockerfile.mcp_server'
            frontend:
              - 'dashboard/**'
            infra:
              - 'infrastructure/terraform/**'
            lambda:
              - 'lambda/**'
              - 'mcp_server/verification/**'
              - 'mcp_server/integrations/arbiter/**'

  # ── Build & Push Backend (Docker → ECR) ──────────────────────────
  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    outputs:
      image: ${{ steps.image-tag.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a  # v2.1.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Generate build timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push MCP Server
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ./mcp_server
          file: ./mcp_server/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.timestamp.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image tag
        id: image-tag
        run: echo "image=${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Build & Push Lambda Images (Docker → ECR → Lambda Update) ───
  build-and-push-lambdas:
    name: Build & Push Lambdas
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.lambda == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a  # v2.1.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Generate build timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push Ring 1
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./lambda/ring1/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING1_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING1_ECR_REPO }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.timestamp.outputs.value }}
          cache-from: type=gha,scope=ring1
          cache-to: type=gha,mode=max,scope=ring1
          platforms: linux/amd64

      - name: Build and push Ring 2
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./lambda/ring2/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING2_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING2_ECR_REPO }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.timestamp.outputs.value }}
          cache-from: type=gha,scope=ring2
          cache-to: type=gha,mode=max,scope=ring2
          platforms: linux/amd64

      - name: Update Lambda function code
        run: |
          echo "Updating Ring 1 Lambda..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_RING1_ECR_REPO }} \
            --image-uri ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING1_ECR_REPO }}:${{ github.sha }}

          echo "Updating Ring 2 Lambda..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_RING2_ECR_REPO }} \
            --image-uri ${{ env.ECR_REGISTRY }}/${{ env.LAMBDA_RING2_ECR_REPO }}:${{ github.sha }}

      - name: Wait for Lambda updates
        run: |
          echo "Waiting for Ring 1 update to complete..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_RING1_ECR_REPO }}

          echo "Waiting for Ring 2 update to complete..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_RING2_ECR_REPO }}

          echo "Both Lambda functions updated successfully"

      - name: Sync Lambda version env vars
        run: |
          # GIT_SHA and BUILD_TIMESTAMP are managed by Terraform, which only
          # runs when infrastructure files change. When only lambda code changes,
          # we must update them here so version probes return the correct sha.
          BUILD_TS="${{ steps.timestamp.outputs.value }}"
          GIT_SHA="${{ github.sha }}"

          for FUNC in "${{ env.LAMBDA_RING1_ECR_REPO }}" "${{ env.LAMBDA_RING2_ECR_REPO }}"; do
            echo "Syncing version env vars for $FUNC..."
            CURRENT_VARS=$(aws lambda get-function-configuration \
              --function-name "$FUNC" \
              --query 'Environment.Variables' \
              --output json)
            UPDATED_VARS=$(echo "$CURRENT_VARS" | \
              jq --arg sha "$GIT_SHA" --arg ts "$BUILD_TS" \
              '. + {GIT_SHA: $sha, BUILD_TIMESTAMP: $ts}')
            aws lambda update-function-configuration \
              --function-name "$FUNC" \
              --environment "{\"Variables\":$UPDATED_VARS}" \
              > /dev/null
            aws lambda wait function-updated --function-name "$FUNC"
            echo "$FUNC version env vars synced"
          done

      - name: Verify Lambda versions
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          echo "Expected git_sha: $EXPECTED_SHA"

          for FUNC in "${{ env.LAMBDA_RING1_ECR_REPO }}" "${{ env.LAMBDA_RING2_ECR_REPO }}"; do
            echo "Checking $FUNC..."
            RESPONSE=$(aws lambda invoke \
              --function-name "$FUNC" \
              --payload '{"action":"version"}' \
              --cli-binary-format raw-in-base64-out \
              /tmp/lambda-version-$FUNC.json \
              --query 'StatusCode' --output text)

            if [ "$RESPONSE" != "200" ]; then
              echo "ERROR: $FUNC invoke failed with status $RESPONSE"
              exit 1
            fi

            DEPLOYED_SHA=$(python3 -c "import json; print(json.load(open('/tmp/lambda-version-$FUNC.json')).get('git_sha',''))")
            echo "$FUNC: deployed=$DEPLOYED_SHA"

            if [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
              echo "ERROR: $FUNC version mismatch: deployed=$DEPLOYED_SHA expected=$EXPECTED_SHA"
              exit 1
            fi

            echo "$FUNC version verified"
          done

          echo "All Lambda versions match $EXPECTED_SHA"

  # ── Terraform Apply (when infrastructure/ changed) ───────────────
  # Terraform Plan runs on EVERY deploy to catch broken config early.
  # If infra files changed, it also applies. If not, it only validates.
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push-backend]
    # Always run: validate on every push, apply only when infra changed.
    if: >-
      always()
      && needs.detect-changes.result == 'success'
      && needs.build-and-push-backend.result != 'failure'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          TF_VARS="-var=enable_evidence_pipeline=false"  # Disabled: evidence pipeline not yet needed in production (Phase 1 GR-0.4). IAM perms are now in place — flip to true when ready.

          # If a new backend image was built, tell Terraform to use it
          if [ -n "$IMAGE_TAG" ]; then
            TF_VARS="$TF_VARS -var=mcp_server_image=$IMAGE_TAG"
          fi

          # Pass build metadata for Lambda env vars
          TF_VARS="$TF_VARS -var=git_sha=${{ github.sha }}"
          TF_VARS="$TF_VARS -var=build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          terraform plan -input=false -no-color $TF_VARS \
            -out=tfplan 2>&1 | tee /tmp/plan-output.txt
        env:
          IMAGE_TAG: ${{ needs.build-and-push-backend.outputs.image }}

      - name: Show plan in summary
        run: |
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: needs.detect-changes.outputs.infra == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Plan OK (no infra changes)
        if: needs.detect-changes.outputs.infra != 'true'
        run: echo "Terraform plan validated successfully (no infra changes, skipping apply)"

  # ── Build & Deploy Frontend (Vite → S3 → CloudFront) ────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      url: ${{ env.BASE_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Generate build timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.VITE_DYNAMIC_ENVIRONMENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || env.API_URL }}
          VITE_REQUIRE_AGENT_API_KEY: ${{ secrets.VITE_REQUIRE_AGENT_API_KEY || 'true' }}
          VITE_ALLOW_DIRECT_SUPABASE_MUTATIONS: ${{ secrets.VITE_ALLOW_DIRECT_SUPABASE_MUTATIONS || 'false' }}
          VITE_ENABLE_EVIDENCE_CAROUSEL: ${{ secrets.VITE_ENABLE_EVIDENCE_CAROUSEL || 'false' }}
          VITE_WORLD_ID_ENABLED: ${{ secrets.VITE_WORLD_ID_ENABLED || 'false' }}
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_BUILD_TIMESTAMP: ${{ steps.timestamp.outputs.value }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: dashboard
        run: |
          # Static assets with long cache (Vite content hashes)
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.md"

          # HTML + manifests with short cache (need fresh on deploy)
          aws s3 cp dist/index.html s3://${{ env.DASHBOARD_S3_BUCKET }}/index.html \
            --cache-control "public, max-age=60"

          # Copy any other HTML/JSON files with short cache
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=60"

          # Skill files (.md) with 5-minute cache (updated frequently)
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.md" \
            --cache-control "public, max-age=300" \
            --content-type "text/markdown"

          # Agent discovery endpoints (RFC 9727, RFC 9728, SEP-1649, Agent Skills Discovery).
          # These files are served without extension per spec. `aws s3 sync` sets
          # content-type to binary/octet-stream for extensionless files, so we upload
          # them explicitly with the correct MIME types.
          if [ -f "dist/.well-known/api-catalog" ]; then
            aws s3 cp dist/.well-known/api-catalog \
              s3://${{ env.DASHBOARD_S3_BUCKET }}/.well-known/api-catalog \
              --cache-control "public, max-age=300" \
              --content-type "application/linkset+json"
          fi
          if [ -f "dist/.well-known/oauth-protected-resource" ]; then
            aws s3 cp dist/.well-known/oauth-protected-resource \
              s3://${{ env.DASHBOARD_S3_BUCKET }}/.well-known/oauth-protected-resource \
              --cache-control "public, max-age=300" \
              --content-type "application/json"
          fi

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/assets/*" "/*.json" "/*.md" "/.well-known/*" "/robots.txt"

      - name: Health check
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BASE_URL }} || echo "000")
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "Frontend healthy ✅"
          else
            echo "Frontend returned $HTTP_STATUS (may need DNS propagation)"
          fi

  # ── Deploy Backend to ECS ────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push-backend, terraform-apply]
    # Run when backend OR infra changed (and upstream didn't fail).
    if: >-
      always()
      && needs.detect-changes.result == 'success'
      && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true')
      && needs.build-and-push-backend.result != 'failure'
      && needs.terraform-apply.result != 'failure'
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      url: ${{ env.API_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Path A: Terraform applied — just force new deployment ────
      - name: Force new ECS deployment (post-Terraform)
        if: needs.detect-changes.outputs.infra == 'true'
        run: |
          echo "Terraform applied infrastructure changes."
          echo "Forcing new ECS deployment to pick up updated task definition..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.MCP_SERVER_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table

      # ── Path B: No infra changes — image-only fast deploy ────────
      - name: Download task definition
        if: needs.detect-changes.outputs.infra != 'true'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.MCP_SERVER_SERVICE }} \
            --query taskDefinition > task-def.json

      - name: Update task definition
        if: needs.detect-changes.outputs.infra != 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@77954e213ba1f9f9cb016b86a1d4f6fcdea0d57e  # v1.8.4
        with:
          task-definition: task-def.json
          container-name: ${{ env.MCP_SERVER_CONTAINER }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}
          environment-variables: |
            EM_BASE_URL=${{ env.API_URL }}
            GIT_SHA=${{ github.sha }}

      - name: Deploy to ECS
        if: needs.detect-changes.outputs.infra != 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@fc8fc60f3a60ffd500fcb13b209c59d221ac8c8c  # v2.6.1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.MCP_SERVER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
          wait-for-minutes: 15

      # ── Force new deployment (ALWAYS — ensures old container is replaced) ──
      # Without this, ECS may keep the old container running indefinitely
      # even after registering a new task definition.
      - name: Force new ECS deployment
        run: |
          echo "Forcing ECS to replace running container with new task definition..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.MCP_SERVER_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table

      # ── Wait for stability (all paths) ─────────────────────────
      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.MCP_SERVER_SERVICE }}

      - name: Health check
        run: |
          sleep 30
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_URL }}/health || echo "000")
            if [ "$HTTP_STATUS" == "200" ]; then echo "Backend healthy ✅"; exit 0; fi
            echo "Attempt $i: $HTTP_STATUS, retrying..."; sleep 10
          done
          echo "Backend health check failed"; exit 1

      - name: Verify deployed version
        run: |
          echo "Verifying deployed version matches expected commit..."
          for i in {1..5}; do
            VERSION_JSON=$(curl -sf "${{ env.API_URL }}/api/v1/version" || echo '{}')
            DEPLOYED_SHA=$(echo "$VERSION_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('git_sha',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED_SHA" == "${{ github.sha }}" ]; then
              echo "Version verified: $DEPLOYED_SHA"
              exit 0
            fi
            echo "Attempt $i: deployed=$DEPLOYED_SHA expected=${{ github.sha }}, retrying..."
            sleep 15
          done
          echo "WARNING: Deployed version ($DEPLOYED_SHA) does not match expected (${{ github.sha }})"
          echo "The container may still be rolling out. Check /api/v1/version manually."
          exit 1

      - name: Verify AI providers
        if: success()
        continue-on-error: true
        run: |
          echo "Checking AI provider health..."
          RESPONSE=$(curl -sf "${{ env.API_URL }}/health/ai-providers" || echo '{"error":"endpoint not reachable"}')
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print(f'WARNING: AI health check failed: {data[\"error\"]}')
              sys.exit(0)
          providers = data.get('providers', {})
          for name, status in providers.items():
              icon = 'OK' if status.get('working') else 'WARN' if status.get('available') else 'MISS'
              print(f'  [{icon}] {name}: model={status.get(\"model\")}, latency={status.get(\"latency_ms\", \"n/a\")}ms')
          working = sum(1 for s in providers.values() if s.get('working'))
          total = len(providers)
          print(f'AI Providers: {working}/{total} working')
          if working == 0 and total > 0:
              print('WARNING: No AI providers responding to health probe (this does not affect deployment)')
          "

  # ── Notify on Failure ────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, terraform-apply, build-and-push-lambdas]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed for commit ${{ github.sha }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
