name: Deploy

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  MCP_SERVER_ECR_REPO: em-production-mcp-server
  ECS_CLUSTER: em-production-cluster
  MCP_SERVER_SERVICE: em-production-mcp-server
  MCP_SERVER_CONTAINER: mcp-server
  DASHBOARD_S3_BUCKET: em-production-dashboard
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DASHBOARD_CLOUDFRONT_ID }}
  BASE_URL: https://execution.market
  API_URL: https://api.execution.market
  TF_DIR: infrastructure/terraform

jobs:
  # ── Change Detection ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'mcp_server/**'
              - 'Dockerfile.mcp_server'
            frontend:
              - 'dashboard/**'
            infra:
              - 'infrastructure/terraform/**'

  # ── Build & Push Backend (Docker → ECR) ──────────────────────────
  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    outputs:
      image: ${{ steps.image-tag.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push MCP Server
        uses: docker/build-push-action@v7
        with:
          context: ./mcp_server
          file: ./mcp_server/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image tag
        id: image-tag
        run: echo "image=${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Terraform Apply (when infrastructure/ changed) ───────────────
  # Terraform Plan runs on EVERY deploy to catch broken config early.
  # If infra files changed, it also applies. If not, it only validates.
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push-backend]
    # Always run: validate on every push, apply only when infra changed.
    if: >-
      always()
      && needs.detect-changes.result == 'success'
      && needs.build-and-push-backend.result != 'failure'
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          TF_VARS="-var=enable_evidence_pipeline=false"  # Disabled: evidence pipeline not yet needed in production (Phase 1 GR-0.4). IAM perms are now in place — flip to true when ready.

          # If a new backend image was built, tell Terraform to use it
          if [ -n "$IMAGE_TAG" ]; then
            TF_VARS="$TF_VARS -var=mcp_server_image=$IMAGE_TAG"
          fi

          terraform plan -input=false -no-color $TF_VARS \
            -out=tfplan 2>&1 | tee /tmp/plan-output.txt
        env:
          IMAGE_TAG: ${{ needs.build-and-push-backend.outputs.image }}

      - name: Show plan in summary
        run: |
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: needs.detect-changes.outputs.infra == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Plan OK (no infra changes)
        if: needs.detect-changes.outputs.infra != 'true'
        run: echo "Terraform plan validated successfully (no infra changes, skipping apply)"

  # ── Build & Deploy Frontend (Vite → S3 → CloudFront) ────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      url: ${{ env.BASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.VITE_DYNAMIC_ENVIRONMENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || env.API_URL }}
          VITE_REQUIRE_AGENT_API_KEY: ${{ secrets.VITE_REQUIRE_AGENT_API_KEY || 'true' }}
          VITE_ALLOW_DIRECT_SUPABASE_MUTATIONS: ${{ secrets.VITE_ALLOW_DIRECT_SUPABASE_MUTATIONS || 'false' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: dashboard
        run: |
          # Static assets with long cache (Vite content hashes)
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.md"

          # HTML + manifests with short cache (need fresh on deploy)
          aws s3 cp dist/index.html s3://${{ env.DASHBOARD_S3_BUCKET }}/index.html \
            --cache-control "public, max-age=60"

          # Copy any other HTML/JSON files with short cache
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=60"

          # Skill files (.md) with 5-minute cache (updated frequently)
          aws s3 sync dist/ s3://${{ env.DASHBOARD_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.md" \
            --cache-control "public, max-age=300" \
            --content-type "text/markdown"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/assets/*" "/*.json" "/*.md"

      - name: Health check
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.BASE_URL }} || echo "000")
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "Frontend healthy ✅"
          else
            echo "Frontend returned $HTTP_STATUS (may need DNS propagation)"
          fi

  # ── Deploy Backend to ECS ────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push-backend, terraform-apply]
    # Run when backend OR infra changed (and upstream didn't fail).
    if: >-
      always()
      && needs.detect-changes.result == 'success'
      && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true')
      && needs.build-and-push-backend.result != 'failure'
      && needs.terraform-apply.result != 'failure'
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      url: ${{ env.API_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Path A: Terraform applied — just force new deployment ────
      - name: Force new ECS deployment (post-Terraform)
        if: needs.detect-changes.outputs.infra == 'true'
        run: |
          echo "Terraform applied infrastructure changes."
          echo "Forcing new ECS deployment to pick up updated task definition..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.MCP_SERVER_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table

      # ── Path B: No infra changes — image-only fast deploy ────────
      - name: Download task definition
        if: needs.detect-changes.outputs.infra != 'true'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.MCP_SERVER_SERVICE }} \
            --query taskDefinition > task-def.json

      - name: Update task definition
        if: needs.detect-changes.outputs.infra != 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.MCP_SERVER_CONTAINER }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.MCP_SERVER_ECR_REPO }}:${{ github.sha }}
          environment-variables: |
            EM_BASE_URL=${{ env.API_URL }}

      - name: Deploy to ECS
        if: needs.detect-changes.outputs.infra != 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.MCP_SERVER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
          wait-for-minutes: 15

      # ── Force new deployment (ALWAYS — ensures old container is replaced) ──
      # Without this, ECS may keep the old container running indefinitely
      # even after registering a new task definition.
      - name: Force new ECS deployment
        run: |
          echo "Forcing ECS to replace running container with new task definition..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.MCP_SERVER_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table

      # ── Wait for stability (all paths) ─────────────────────────
      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.MCP_SERVER_SERVICE }}

      - name: Health check
        run: |
          sleep 30
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_URL }}/health || echo "000")
            if [ "$HTTP_STATUS" == "200" ]; then echo "Backend healthy ✅"; exit 0; fi
            echo "Attempt $i: $HTTP_STATUS, retrying..."; sleep 10
          done
          echo "Backend health check failed"; exit 1

      - name: Verify AI providers
        if: success()
        continue-on-error: true
        run: |
          echo "Checking AI provider health..."
          RESPONSE=$(curl -sf "${{ env.API_URL }}/health/ai-providers" || echo '{"error":"endpoint not reachable"}')
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print(f'WARNING: AI health check failed: {data[\"error\"]}')
              sys.exit(0)
          providers = data.get('providers', {})
          for name, status in providers.items():
              icon = 'OK' if status.get('working') else 'WARN' if status.get('available') else 'MISS'
              print(f'  [{icon}] {name}: model={status.get(\"model\")}, latency={status.get(\"latency_ms\", \"n/a\")}ms')
          working = sum(1 for s in providers.values() if s.get('working'))
          total = len(providers)
          print(f'AI Providers: {working}/{total} working')
          if working == 0 and total > 0:
              print('WARNING: No AI providers responding to health probe (this does not affect deployment)')
          "

  # ── Notify on Failure ────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, terraform-apply]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed for commit ${{ github.sha }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
