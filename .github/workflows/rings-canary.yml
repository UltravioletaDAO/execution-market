# Rings nightly canary — Phase 6 (Task 6.3) of the Rings Verification fixes.
#
# C-39: Ring 1 + Ring 2 slept for 7 weeks without anyone noticing. This
# workflow creates one synthetic submission per night against STAGING via
# the Golden Flow, then asserts the rings produced coherent results
# (ring1 terminal state + Ring 2 verdict + verification events).
#
# Required repository secrets (staging-scoped, NOT production):
#   STAGING_API_URL                  -- already used by deploy-staging.yml
#   STAGING_SUPABASE_URL             -- staging Supabase project URL
#   STAGING_SUPABASE_SERVICE_KEY     -- staging service role key
#   CANARY_AGENT_PRIVATE_KEY         -- funded test agent wallet (< $0.30/run)
#   CANARY_WORKER_PRIVATE_KEY        -- test worker wallet
#   CANARY_WORKER_WALLET             -- test worker address
#
# The synthetic submission is text-only (Golden Flow), which exercises the
# skipped_no_media -> Ring 2 direct path. TODO (follow-up): add a photo
# fixture (iPhone EXIF + GPS) submission to exercise the full Ring 1
# PHOTINT pipeline nightly.

name: Rings Canary

on:
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC
  workflow_dispatch: {}

concurrency:
  group: rings-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check canary secrets are configured
        id: secrets
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          CANARY_AGENT_PRIVATE_KEY: ${{ secrets.CANARY_AGENT_PRIVATE_KEY }}
        run: |
          if [[ -z "$STAGING_API_URL" || -z "$CANARY_AGENT_PRIVATE_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Rings canary secrets not configured — skipping (see workflow header)"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install "uvd-x402-sdk[wallet]>=0.21.0" httpx python-dotenv web3

      - name: Synthetic submission (Golden Flow vs staging)
        if: steps.secrets.outputs.configured == 'true'
        env:
          EM_API_URL: ${{ secrets.STAGING_API_URL }}
          WALLET_PRIVATE_KEY: ${{ secrets.CANARY_AGENT_PRIVATE_KEY }}
          EM_WORKER_PRIVATE_KEY: ${{ secrets.CANARY_WORKER_PRIVATE_KEY }}
          EM_WORKER_WALLET: ${{ secrets.CANARY_WORKER_WALLET }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
        run: |
          python scripts/e2e_golden_flow.py --bounty 0.05

      - name: Assert rings produced coherent results
        if: steps.secrets.outputs.configured == 'true'
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
          CANARY_LOOKBACK_MIN: "30"
          CANARY_TIMEOUT_SEC: "300"
        run: |
          python scripts/rings_canary_check.py
