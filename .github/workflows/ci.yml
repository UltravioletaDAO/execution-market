name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      xmtp-bot: ${{ steps.filter.outputs.xmtp-bot }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
      admin-dashboard: ${{ steps.filter.outputs.admin-dashboard }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'mcp_server/**'
            frontend:
              - 'dashboard/**'
            xmtp-bot:
              - 'xmtp-bot/**'
            e2e:
              - 'e2e/**'
            admin-dashboard:
              - 'admin-dashboard/**'
            infra:
              - '.github/**'
              - 'Dockerfile*'
              - 'docker-compose*'
  skill-sync-check:
    name: Skill Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify canonical skill == backend copy
        run: |
          # Normalize line endings before comparing (Windows dev may add CRLF)
          CANONICAL=$(cat dashboard/public/skill.md | tr -d '\r' | sha256sum | cut -d' ' -f1)
          BACKEND=$(cat mcp_server/skills/SKILL.md | tr -d '\r' | sha256sum | cut -d' ' -f1)
          if [ "$CANONICAL" != "$BACKEND" ]; then
            echo "::error::skill.md out of sync! dashboard/public/skill.md (canonical) != mcp_server/skills/SKILL.md (backend)"
            echo "Fix: cp dashboard/public/skill.md mcp_server/skills/SKILL.md"
            diff <(tr -d '\r' < dashboard/public/skill.md) <(tr -d '\r' < mcp_server/skills/SKILL.md) | head -30
            exit 1
          fi
          VERSION=$(head -5 dashboard/public/skill.md | grep version | awk '{print $2}')
          echo "Skill files in sync (v${VERSION})"

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: mcp_server
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: mcp_server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

      - name: Run mypy
        run: |
          mypy \
            models.py \
            api/admin.py \
            api/reputation.py \
            websocket/server.py \
            --ignore-missing-imports \
            --follow-imports=skip

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-backend]
    if: always() && !cancelled() && needs.detect-changes.outputs.backend == 'true' && (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped')
    defaults:
      run:
        working-directory: mcp_server
    env:
      TESTING: "true"
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: mcp_server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run arbiter profile (fast fail-fast check)
        run: |
          pytest tests/test_arbiter_service.py tests/test_arbiter_integration.py tests/test_arbiter_phase5.py -v
        env:
          TESTING: "true"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: mcp_server/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: mcp_server/htmlcov/
          retention-days: 7

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-frontend]
    if: always() && !cancelled() && needs.detect-changes.outputs.frontend == 'true' && (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped')
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: dashboard/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: dashboard/coverage/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke (Chromium)
    runs-on: ubuntu-latest
    needs: [detect-changes, test-frontend]
    if: always() && !cancelled() && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.e2e == 'true') && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            dashboard/package-lock.json
            e2e/package-lock.json

      - name: Install dashboard dependencies
        run: npm install
        working-directory: dashboard

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run smoke suite
        run: npx playwright test tests/auth.spec.ts tests/tasks.spec.ts --project=chromium --reporter=list
        working-directory: e2e

  test-xmtp-bot:
    name: Test XMTP Bot
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.xmtp-bot == 'true'
    defaults:
      run:
        working-directory: xmtp-bot
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: xmtp-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: TypeScript check
        run: npx tsc --noEmit

  test-admin-dashboard:
    name: Test Admin Dashboard
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.admin-dashboard == 'true'
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend, test-xmtp-bot, test-admin-dashboard, e2e-smoke]
    if: always() && !cancelled() && github.event_name == 'push' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true') && !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./mcp_server
          push: false
          tags: em-mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          push: false
          tags: em-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
