# Execution Market CI - Pull Request Checks
name: PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'mcp_server/**'
      - 'dashboard/**'
      - '.github/workflows/pr.yml'

jobs:
  # Test MCP Server
  test-mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd mcp_server
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd mcp_server
          pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./mcp_server/coverage.xml
          flags: mcp-server
          fail_ci_if_error: false

  # Test Dashboard
  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Type check
        run: |
          cd dashboard
          npm run typecheck

      - name: Lint
        run: |
          cd dashboard
          npm run lint

      - name: Run tests
        run: |
          cd dashboard
          npm run test:run

  # Build check
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build MCP Server Docker image
        run: |
          docker build -t em-mcp:test mcp_server/

      - name: Build Dashboard Docker image
        run: |
          docker build -t em-dashboard:test dashboard/

  # Terraform validation
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Terraform Format
        run: |
          cd infrastructure/terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infrastructure/terraform
          terraform validate
