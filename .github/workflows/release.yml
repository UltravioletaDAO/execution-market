name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get current version
        id: current
        run: |
          # Try to get version from mcp_server pyproject.toml
          if [ -f mcp_server/pyproject.toml ]; then
            CURRENT=$(grep -m1 'version = ' mcp_server/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          elif [ -f dashboard/package.json ]; then
            CURRENT=$(jq -r '.version' dashboard/package.json)
          else
            CURRENT="0.0.0"
          fi
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version_type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          if [ "${{ inputs.prerelease }}" == "true" ]; then
            NEW_VERSION="${NEW_VERSION}-rc.1"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s" | head -50)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline --pretty=format:"- %s")
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^- docs" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^- (chore|refactor|style|test)" || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|fix|docs|chore|refactor|style|test)" || true)

          # Build changelog
          CHANGELOG="## What's Changed\n\n"

          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### Features\n$FEATURES\n\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG+="### Bug Fixes\n$FIXES\n\n"
          fi

          if [ -n "$DOCS" ]; then
            CHANGELOG+="### Documentation\n$DOCS\n\n"
          fi

          if [ -n "$CHORES" ]; then
            CHANGELOG+="### Maintenance\n$CHORES\n\n"
          fi

          if [ -n "$OTHER" ]; then
            CHANGELOG+="### Other\n$OTHER\n\n"
          fi

          # Add contributors
          if [ -n "$LATEST_TAG" ]; then
            CONTRIBUTORS=$(git log ${LATEST_TAG}..HEAD --format='@%an' | sort -u | tr '\n' ' ')
          else
            CONTRIBUTORS=$(git log --format='@%an' | sort -u | head -10 | tr '\n' ' ')
          fi
          CHANGELOG+="### Contributors\n$CONTRIBUTORS"

          # Save to file for later use
          echo -e "$CHANGELOG" > changelog.md

          # Output for GitHub
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

  bump-versions:
    name: Bump Version Numbers
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update backend version
        working-directory: mcp_server
        run: |
          if [ -f pyproject.toml ]; then
            sed -i "s/^version = .*/version = \"${{ needs.prepare-release.outputs.new_version }}\"/" pyproject.toml
            echo "Updated mcp_server/pyproject.toml"
          fi

      - name: Update frontend version
        working-directory: dashboard
        run: |
          if [ -f package.json ]; then
            npm version ${{ needs.prepare-release.outputs.new_version }} --no-git-tag-version
            echo "Updated dashboard/package.json"
          fi

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ needs.prepare-release.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)

          # Build new changelog content
          {
            echo "# Changelog"
            echo ""
            echo "## [$NEW_VERSION] - $DATE"
            echo ""
            echo "${{ needs.prepare-release.outputs.changelog }}"
            echo ""
            if [ -f CHANGELOG.md ]; then
              # Skip the first line (old "# Changelog" header) from existing file
              tail -n +2 CHANGELOG.md
            else
              echo "All notable changes to this project will be documented in this file."
            fi
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Create release branch
        run: |
          BRANCH="release/v${{ needs.prepare-release.outputs.new_version }}"
          git checkout -b $BRANCH
          git add -A
          git commit -m "chore: bump version to ${{ needs.prepare-release.outputs.new_version }}"
          git push origin $BRANCH

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ needs.prepare-release.outputs.new_version }}
          base: main
          title: "Release v${{ needs.prepare-release.outputs.new_version }}"
          body: |
            ## Release v${{ needs.prepare-release.outputs.new_version }}

            This PR prepares the release of version ${{ needs.prepare-release.outputs.new_version }}.

            ${{ needs.prepare-release.outputs.changelog }}

            ---

            After merging, the release will be created automatically.
          labels: |
            release
            automated

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, bump-versions]
    if: github.event.inputs.prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v${{ needs.prepare-release.outputs.new_version }}

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          name: v${{ needs.prepare-release.outputs.new_version }}
          body_path: changelog.md
          draft: true
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Release v${{ needs.prepare-release.outputs.new_version }} prepared",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Execution Market Release Prepared* :package:\n\nVersion: `v${{ needs.prepare-release.outputs.new_version }}`\nType: `${{ inputs.version_type }}`\n\nA draft release has been created. Review and publish when ready."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
