version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/mcp_server"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"

  # Dashboard (React)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"

  # Admin Dashboard
  - package-ecosystem: "npm"
    directory: "/admin-dashboard"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"

  # Scripts
  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # SDK TypeScript
  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "sdk"

  # Smart Contracts
  - package-ecosystem: "npm"
    directory: "/contracts"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "contracts"

  # E2E Tests
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "testing"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Docker
  - package-ecosystem: "docker"
    directory: "/mcp_server"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/dashboard"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "infrastructure"
