[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short -p no:pytest_ethereum
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    core: essential tests that validate active production code
    payments: payment dispatcher, escrow, fee tests
    erc8004: ERC-8004 identity, reputation, scoring, side effects
    erc8128: ERC-8128 wallet-based HTTP message signature authentication
    security: fraud detection, GPS antispoofing, safety, auth hardening
    infrastructure: webhooks, websocket, a2a protocol, platform config
    h2a: H2A (Human-to-Agent) marketplace endpoint tests
    agent_executor: agent executor tools and lifecycle tests
    a2a_bridge: A2A protocol payment bridge tests
    migrations: database migration integrity tests
    escrow_validation: Escrow validation at assignment, submission, and approval checkpoints
    admin: admin API endpoint tests (config, stats, tasks, payments, users, analytics, audit)
    verification: PHOTINT verification system (prompts, inference logging, model routing, EXIF, analytics)
    arbiter: Ring 2 Arbiter Service (dual-inference verdict, tier routing, consensus, auto-release/refund)
    agentkit: World AgentKit human verification integration tests
    worldid: World ID 4.0 integration tests
    magika: Magika content-based file type validation tests (Ring 1 Phase B)
    veryai: VeryAI palm-print biometric integration tests
    clawkey: ClawKey KYA (Know Your Agent) integration tests
